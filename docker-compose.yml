services:
  db:
    image: postgres:16
    container_name: hcp_crm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hcp_crm
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
